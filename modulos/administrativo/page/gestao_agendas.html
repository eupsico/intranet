<div class="container-fluid py-4">
    <div class="card shadow-sm">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i class="fas fa-calendar-alt me-2"></i>Gestão de Agendas - Serviço Social
            </h5>
            <button id="reload-agenda-btn" class="btn btn-sm btn-outline-secondary">
                <i class="fas fa-sync-alt"></i> Atualizar
            </button>
        </div>
        <div class="card-body" id="gestao-agenda-content">
            <div id="loading-agenda-spinner" class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
                <p class="mt-2">Carregando disponibilidades...</p>
            </div>

            <div id="error-message-admin" class="alert alert-danger d-none" role="alert"></div>

            <div class="accordion" id="disponibilidade-admin-content">
            </div>
        </div>
    </div>
</div>
