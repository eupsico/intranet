<div class="container-fluid py-4">
    <div class="card shadow-sm">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i class="fas fa-calendar-alt me-2"></i>Gestão de Agendas - Serviço Social
            </h5>
            <button id="reload-agenda-btn" class="btn btn-sm btn-outline-secondary">
                <i class="fas fa-sync-alt"></i> Atualizar
            </button>
        </div>
        <div class="card-body" id="gestao-agenda-content">
            <div id="loading-agenda-spinner" class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
                <p class="mt-2">Carregando disponibilidades...</p>
            </div>

            <div id="error-message-admin" class="alert alert-danger d-none" role="alert"></div>

            <div class="accordion" id="disponibilidade-admin-content">
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="agendaModal" tabindex="-1" aria-labelledby="agendaModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title" id="agendaModalLabel">Abrir Agenda</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Configure abaixo quais dias serão abertos para <strong>Triagem</strong> e quais serão para <strong>Reavaliação</strong>.</p>
                    <div id="agenda-config-content"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="saveAgendaButton">
                        <i class="fas fa-calendar-check me-2"></i>Salvar e Abrir Agenda
                    </button>
                </div>
            </div>
        </div>
    </div>
