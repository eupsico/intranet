<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Financeiro - EuPsico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="../../../assets/css/design-system.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    
    <div id="app">
        <div id="dashboard-view">
            <div class="layout-container">
                
                <nav class="sidebar">
                    <div class="sidebar-content-wrapper">
                        <ul id="sidebar-menu" class="sidebar-menu">
                            </ul>
                    </div>
                </nav>
                
                <div id="menu-overlay" class="menu-overlay"></div>

                <header class="header">
                    <div class="header-start">
                        <button id="sidebar-toggle" title="Alternar menu">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                        </button>
                        <img src="../../../assets/img/logo-branca.png" alt="Logo EuPsico" class="header-logo">
                    </div>
                    <div class="user-profile-header">
                        <img id="user-photo-header" src="https://i.ibb.co/61Ym24n/default-user.png" alt="Foto do usuário">
                        <span id="user-email-header">carregando...</span>
                        <a href="#" id="logout-button-dashboard" class="logout-button-dashboard">Sair</a>
                    </div>
                </header>

                <main class="main-content">
                    <div class="page-header-container">
                        <h1>Painel Financeiro</h1>
                        <p>Gestão de pagamentos, cobranças, relatórios e fluxo de caixa.</p>
                    </div>

                    <div id="finance-tabs" class="tabs-container">
                        </div>

                    <div id="content-area" class="tab-content-area">
                        <h2>Carregando...</h2>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <div id="financial-views" style="display: none;">
        
        <div data-view-id="dashboard">
            </div>

        <div data-view-id="gestao_profissionais">
            </div>

        <div data-view-id="resumo_horas">
            </div>

        </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-functions-compat.js"></script>
    
    <script type="module" src="../../../assets/js/app.js"></script> 
    <script src="../js/painel-script.js"></script>

</body>
</html>
