<div class="view-container">
    <div class="dashboard-section">
        <h2>Agendar Supervisão</h2>
        <p>Abaixo estão os supervisores disponíveis. Clique em um perfil para ver mais detalhes e agendar um horário.</p>
    </div>

    <div id="supervisor-cards-container" class="modules-grid dashboard-section">
        <div class="loading-spinner"></div>
    </div>
</div>

<div id="supervisor-details-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Perfil do Supervisor</h2>
            <button class="close-modal-btn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="details-header">
                <img id="details-photo" src="../../../assets/img/avatar-padrao.png" alt="Foto do Supervisor">
                <div class="details-identity">
                    <h3 id="details-nome"></h3>
                    <p id="details-titulo"></p>
                </div>
            </div>
            <div class="details-section">
                <h4>Formação</h4>
                <ul id="details-formacao"></ul>
            </div>
            <div class="details-section">
                <h4>Especialização</h4>
                <ul id="details-especializacao"></ul>
            </div>
            <div class="details-section">
                <h4>Áreas de Atuação</h4>
                <ul id="details-atuacao"></ul>
            </div>
        </div>
        <div class="modal-footer">
            <button id="btn-agendar-supervisao" class="btn btn-primary">Agendar Supervisão</button>
        </div>
    </div>
</div>

<div id="edit-profile-modal" class="modal-overlay" style="display: none;">
    </div>
