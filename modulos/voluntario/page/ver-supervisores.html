<div id="edit-profile-modal" class="modal-overlay" style="display: none;">
    </div>

<div id="supervisor-details-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Perfil do Supervisor</h2>
            <button class="close-modal-btn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="details-header">
                <img id="details-photo" src="" alt="Foto do Supervisor" class="supervisor-photo">
                <div class="details-identity">
                    <h3 id="details-nome"></h3>
                    <p id="details-titulo"></p>
                </div>
            </div>
            <div class="details-section">
                <h4>Formação</h4>
                <ul id="details-formacao"></ul>
            </div>
            <div class="details-section">
                <h4>Especialização</h4>
                <ul id="details-especializacao"></ul>
            </div>
            <div class="details-section">
                <h4>Áreas de Atuação</h4>
                <ul id="details-atuacao"></ul>
            </div>
        </div>
        <div class="modal-footer">
            <button id="btn-agendar-supervisao" class="action-button">Agendar Supervisão</button>
        </div>
    </div>
</div>
