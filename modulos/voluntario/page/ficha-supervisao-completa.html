<form id="ficha-supervisao-form" class="dashboard-section">
    <input type="hidden" id="document-id" name="documentId">
    
    <h2>Ficha de Acompanhamento de Supervisão</h2>

    <div class="section-header"><h3>Identificação Geral</h3></div>
    <div class="form-row-3-col">
        <div class="form-group">
            <label for="supervisorUid">Nome do supervisor(a):*</label>
            <select id="supervisorUid" name="supervisorUid" required><option value="">Carregando...</option></select>
        </div>
        <div class="form-group">
            <label for="data">Data da supervisão:*</label>
            <input type="date" id="data" name="data" required>
        </div>
        <div class="form-group">
            <label for="terapiaInicio">Data de início da terapia:*</label>
            <input type="date" id="terapiaInicio" name="terapiaInicio" required>
        </div>
    </div>

    <div class="section-header"><h3>1. Identificação do Psicólogo(a)</h3></div>
    <div class="form-row-3-col">
        <div class="form-group">
            <label for="psicologoNome">Nome do psicólogo(a):*</label>
            <input type="text" id="psicologoNome" name="psicologoNome" readonly required>
        </div>
        <div class="form-group">
            <label for="psicologoPeriodo">Período/Semestre (estagiários):</label>
            <input type="number" id="psicologoPeriodo" name="psicologoPeriodo">
        </div>
        <div class="form-group">
            <label for="psicologoAbordagem">Abordagem teórica:</label>
            <select id="psicologoAbordagem" name="psicologoAbordagem">
                <option value="">Selecione a abordagem</option>
                <option value="Terapia Cognitivo-Comportamental">Terapia Cognitivo-Comportamental</option>
                <option value="Psicodrama">Psicodrama</option>
                <option value="Humanista">Humanista</option>
                <option value="Gestalt Terapia">Gestalt Terapia</option>
                <option value="Psicanálise">Psicanálise</option>
                <option value="Outra">Outra</option>
            </select>
        </div>
    </div>
    <div class="form-group hidden-field" id="outraAbordagemContainer">
        <label for="outraAbordagem">Especifique a outra abordagem:</label>
        <input type="text" id="outraAbordagem" name="outraAbordagem">
    </div>

    <div class="section-header"><h3>2. Identificação do Caso (dados sigilosos)</h3></div>
    <div class="form-row-4-col">
        <div class="form-group">
            <label for="pacienteIniciais">Iniciais do(a) paciente:*</label>
            <input type="text" id="pacienteIniciais" name="pacienteIniciais" required placeholder="Ex: J.S.">
        </div>
        <div class="form-group">
            <label for="pacienteIdade">Idade:*</label>
            <input type="number" id="pacienteIdade" name="pacienteIdade" required>
        </div>
        <div class="form-group">
            <label for="pacienteGenero">Gênero:</label>
            <select id="pacienteGenero" name="pacienteGenero">
                <option value="">Selecione</option>
                <option value="Masculino">Masculino</option>
                <option value="Feminino">Feminino</option>
                <option value="Não-binário">Não-binário</option>
                <option value="Outro">Outro</option>
                <option value="Prefiro não informar">Prefiro não informar</option>
            </select>
        </div>
        <div class="form-group">
            <label for="pacienteSessoes">Nº de sessões:*</label>
            <input type="number" id="pacienteSessoes" name="pacienteSessoes" required>
        </div>
    </div>
    <div class="form-group">
        <label for="pacienteApresentacao">Apresentação geral (queixa, demanda):*</label>
        <textarea id="pacienteApresentacao" name="pacienteApresentacao" rows="3" required></textarea>
    </div>

    <div class="section-header"><h3>FASE 1: INÍCIO DA TERAPIA (Sessões 1-8)</h3></div>
    <div class="form-group"><label for="fase1Data">Data do preenchimento:</label><input type="date" id="fase1Data" name="fase1Data"></div>
    <div class="form-group"><label for="fase1Foco">Foco do atendimento:</label><textarea id="fase1Foco" name="fase1Foco" rows="3"></textarea></div>
    <div class="form-group"><label for="fase1Objetivos">Objetivos terapêuticos:</label><textarea id="fase1Objetivos" name="fase1Objetivos" rows="3"></textarea></div>
    <div class="form-group"><label for="fase1Hipoteses">Primeiras hipóteses diagnósticas:</label><textarea id="fase1Hipoteses" name="fase1Hipoteses" rows="3"></textarea></div>
    <div class="form-group"><label for="fase1ObsSupervisor">Observações da Supervisão (FASE 1):</label><textarea id="fase1ObsSupervisor" name="fase1ObsSupervisor" rows="3"></textarea></div>

    <div class="section-header"><h3>FASE 2: MEIO DA TERAPIA (Aprox. 3 meses)</h3></div>
    <div class="form-group"><label for="fase2Data">Data do preenchimento:</label><input type="date" id="fase2Data" name="fase2Data"></div>
    <div class="form-group"><label for="fase2Reavaliacao">Reavaliação do foco:</label><textarea id="fase2Reavaliacao" name="fase2Reavaliacao" rows="3"></textarea></div>
    <div class="form-group"><label for="fase2Progresso">Progresso em direção aos objetivos:</label><textarea id="fase2Progresso" name="fase2Progresso" rows="3"></textarea></div>
    <div class="form-group"><label for="fase2ObsSupervisor">Observações da Supervisão (FASE 2):</label><textarea id="fase2ObsSupervisor" name="fase2ObsSupervisor" rows="3"></textarea></div>

    <div class="section-header"><h3>FASE 3: PROCESSO DE ALTA (5º e 6º mês)</h3></div>
    <div class="form-group"><label for="fase3Data">Data do preenchimento:</label><input type="date" id="fase3Data" name="fase3Data"></div>
    <div class="form-group"><label for="fase3Avaliacao">Avaliação final dos objetivos:</label><textarea id="fase3Avaliacao" name="fase3Avaliacao" rows="3"></textarea></div>
    <div class="form-group"><label for="fase3Mudancas">Principais mudanças e aprendizados:</label><textarea id="fase3Mudancas" name="fase3Mudancas" rows="3"></textarea></div>
    <div class="form-group"><label for="fase3ObsSupervisor">Observações da Supervisão (FASE 3):</label><textarea id="fase3ObsSupervisor" name="fase3ObsSupervisor" rows="3"></textarea></div>
    
    <div class="section-header"><h3>Observações Finais</h3></div>
    <div class="form-group">
        <label for="statusFinal">Status do caso:</label>
        <select id="statusFinal" name="statusFinal">
            <option value="">Selecione o status</option>
            <option value="Alta">Alta</option>
            <option value="Desistência">Desistência</option>
            <option value="Em Andamento">Em Andamento</option>
        </select>
    </div>
    <div class="form-group"><label for="obsFinais">Observações finais relevantes:</label><textarea id="obsFinais" name="obsFinais" rows="3"></textarea></div>
    <div class="form-group"><label for="obsFinaisSupervisor">Observações da Supervisão (Finais):</label><textarea id="obsFinaisSupervisor" name="obsFinaisSupervisor" rows="3"></textarea></div>
    <div class="form-group"><label for="dataAlta">Data da alta/desistência:</label><input type="date" id="dataAlta" name="dataAlta"></div>
    <div class="form-group"><label for="assinaturaSupervisor">Assinatura do supervisor:</label><input type="text" id="assinaturaSupervisor" name="assinaturaSupervisor"></div>

    <div class="form-actions" style="text-align: right; margin-top: 30px;">
        <button type="submit" class="btn btn-primary">Salvar Ficha</button>
    </div>
</form>
