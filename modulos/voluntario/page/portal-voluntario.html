<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Voluntário - EuPsico</title>
        <script>
            // Obtém o nome da página atual (sem extensão)
            const pageName = window.location.pathname.split("/").pop().replace(".html", "");

            // Lista de CSSs comuns que devem ser carregados sempre
            const commonStyles = [
                "../../../assets/css/design-system.css",
                "../../css/ficha-supervisao.css"
            ];

            // CSS específico da página
            const pageSpecificCSS = `../css/${pageName}.css`;

            // Função para adicionar um CSS ao <head>
            function loadCSS(href) {
                const link = document.createElement("link");
                link.rel = "stylesheet";
                link.href = href;
                document.head.appendChild(link);
            }

            // Carrega os estilos comuns
            commonStyles.forEach(loadCSS);

            // Tenta carregar o CSS específico da página
            fetch(pageSpecificCSS)
                .then(response => {
                    if (response.ok) loadCSS(pageSpecificCSS);
                    else console.warn("CSS da página não encontrado:", pageSpecificCSS);
                })
                .catch(() => console.warn("Erro ao carregar CSS:", pageSpecificCSS));
        </script>

</head>
<body>
    <div id="app">
        <div class="layout-container">
            <header class="header">
                <div class="header-start">
                    <button id="sidebar-toggle" title="Alternar menu">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <div id="page-title-container">
                        <h1>Portal do Voluntário</h1>
                        <p>Seu espaço central para informações, ferramentas e solicitações.</p>
                    </div>
                </div>
                <div class="user-profile-header">
                    <img id="user-photo-header" src="" alt="Foto do usuário">
                    <span id="user-greeting"></span>
                    <a href="#" id="logout-button-dashboard" class="logout-button-dashboard">Sair</a>
                </div>
            </header>

            <nav class="sidebar">
                <div class="sidebar-content-wrapper">
                    <ul id="sidebar-menu" class="sidebar-menu">
                        </ul>
                </div>
            </nav>
            <div id="menu-overlay" class="menu-overlay"></div>

            <main class="main-content">
                <div id="content-area">
                    <div class="loading-spinner"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

    <script type="module" src="../../../assets/js/firebase-init.js"></script>
    <script type="module" src="../js/portal-voluntario.js"></script>
</body>
</html>
