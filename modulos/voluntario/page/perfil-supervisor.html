<div class="view-container">
    <div class="dashboard-section">
        <h1>Painel do Supervisor</h1>
        <p>Gerencie seu perfil, supervisionados e agendamentos.</p>
    </div>

    <nav class="tabs-container" id="supervisor-tabs" aria-label="Navegação do Painel do Supervisor">
        <button class="tab-link active" data-tab="meu-perfil">Meu Perfil</button>
        <button class="tab-link" data-tab="meus-supervisionados">Meus Supervisionados</button>
        <button class="tab-link" data-tab="meus-agendamentos">Meus Agendamentos</button>
    </nav>

    <section id="meu-perfil" class="tab-content">
        <div class="loading-spinner"></div>
    </section>
    <section id="meus-supervisionados" class="tab-content" style="display: none;">
        <div class="loading-spinner"></div>
    </section>
    <section id="meus-agendamentos" class="tab-content" style="display: none;">
        <div class="loading-spinner"></div>
    </section>
</div>

<div id="edit-supervisor-profile-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Editar Perfil</h2>
            <button class="close-modal-btn">&times;</button>
        </div>
        <div class="modal-body">
            <form id="edit-supervisor-profile-form">
                <input type="hidden" id="editing-uid" name="uid">
                
                <div class="form-group">
                    <label for="edit-fotoUrl">URL da Foto</label>
                    <input type="text" id="edit-fotoUrl" name="fotoUrl" class="form-control" placeholder="assets/img/supervisores/seu-nome.png">
                </div>
                <div class="form-group">
                    <label for="edit-titulo">Título (Ex: SUPERVISORA CLÍNICA)</label>
                    <input type="text" id="edit-titulo" name="titulo" class="form-control">
                </div>
                <div class="form-group">
                    <label for="edit-crp">CRP</label>
                    <input type="text" id="edit-crp" name="crp" class="form-control">
                </div>
                <div class="form-group">
                    <label for="edit-telefone">Telefone</label>
                    <input type="text" id="edit-telefone" name="telefone" class="form-control">
                </div>
                <div class="form-group">
                    <label for="edit-email">Email</label>
                    <input type="email" id="edit-email" name="email" class="form-control">
                </div>
                <div class="form-group">
                    <label for="edit-abordagem">Abordagem Teórica</label>
                    <input type="text" id="edit-abordagem" name="abordagem" class="form-control">
                </div>

                <hr style="margin: 20px 0;">
                <p>Para os campos abaixo, insira um item por linha.</p>

                <div class="form-group">
                    <label for="edit-formacao">Formação</label>
                    <textarea id="edit-formacao" name="formacao" rows="3" class="form-control"></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-especializacao">Especialização</label>
                    <textarea id="edit-especializacao" name="especializacao" rows="4" class="form-control"></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-atuacao">Áreas de Atuação</label>
                    <textarea id="edit-atuacao" name="atuacao" rows="4" class="form-control"></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-supervisaoInfo">Informações de Supervisão</label>
                    <textarea id="edit-supervisaoInfo" name="supervisaoInfo" rows="4" class="form-control"></textarea>
                </div>

                <div class="form-group">
                    <label>Dias e Horários Disponíveis</label>
                    <div id="horarios-editor-container"></div>
                    <button type="button" id="add-horario-btn" class="btn btn-secondary" style="margin-top: 10px;">+ Adicionar Horário</button>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary close-modal-btn">Cancelar</button>
            <button type="submit" id="save-profile-btn" class="btn btn-primary" form="edit-supervisor-profile-form">Salvar Alterações</button>
        </div>
    </div>
</div>
